<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>{{ block "title" . }}{{ with .Title }}{{ . }} | {{ end }}{{ .Site.Title }}{{ end }}</title>
<link rel="stylesheet" href="/css/main.css" />
{{- if .IsHome }}<meta name="description" content="Pack 440 - Scarsdale Cub Scouts" />{{ end -}}
</head>
<body>
  {{ partial "header.html" . }}

  <!-- Responsive title for Contact page -->
  <div class="contact-title">
    <h1 style="color: #000; font-size: 28px; margin: 0; font-weight: 700;">{{ .Title }}</h1>
  </div>

  <style>
    /* Mobile-first: title flows in document, content follows */
    .contact-title {
      padding: 20px 16px 0 20px;
    }
    
    #content.container {
      padding-top: 15px;
    }
    
    /* Desktop: absolute title to clear logo, content clears logo vertically */
    @media (min-width: 550px) {
      .contact-title {
        position: absolute;
        left: 340px;
        top: 200px;
        z-index: 10;
        padding: 0;
      }
      .contact-title h1 {
        font-size: 36px !important;
      }
      
      #content.container {
        padding-top: 150px;
      }
    }
  </style>

  <main id="content" class="container">
    {{ block "main" . }}{{ .Content }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
