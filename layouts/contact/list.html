{{ define "main" }}
<div style="margin-left: 50px; margin-right: 40px; background: #3E6947; color: #fff; min-height: 500px; padding: 40px 20px 40px 20px; margin-top: 60px;">
  <div style="max-width: 980px;">
    <div>
      {{- with .Params.intro_text -}}
      <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 40px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px;">
        <p style="color: #fff; margin: 5px 0; font-size: 18px;">{{ . }}</p>
      </div>
      {{- end -}}
      
      {{- range .Params.contacts -}}
      <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 40px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px;">
        <img src="{{ .photo }}" alt="{{ .name }}" style="width: 150px; height: 150px; border-radius: 50%; border: 6px solid #fff; object-fit: cover; flex-shrink: 0;">
        <div>
          <h3 style="color: #fff; font-size: 24px; margin: 0 0 10px 0; font-weight: 600;">{{ .name }}</h3>
          <p style="color: #fff; margin: 5px 0; font-size: 18px;">{{ .phone }}</p>
          <p style="color: #fff; margin: 5px 0; font-size: 18px;"><a href="mailto:{{ .email }}" style="color: #fff; text-decoration: underline;">{{ .email }}</a></p>
        </div>
      </div>
      {{- end -}}
    </div>
  </div>
</div>
{{ end }}
