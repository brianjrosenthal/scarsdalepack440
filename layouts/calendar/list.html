{{ define "main" }}
<div class="calendar-main-container" style="background: #fff; color: #333; min-height: 500px;">
  <div class="calendar-content" style="max-width: 980px;">
    <div class="calendar-card" style="padding: 0px 25px; background: #f9f9f9; border-radius: 12px; border: 1px solid #e0e0e0; line-height: 1.8; font-size: 16px; color: #333;">
      {{ .Content }}
    </div>
    <div class="calendar-cta">
      <a href="https://my.scarsdalepack440.org/public_calendar.php" class="cta-button" target="_blank">View Public Calendar</a>
    </div>
  </div>
</div>

<style>
  /* Mobile-first: natural flow with padding */
  .calendar-main-container {
    padding: 0 16px 40px 16px;
  }
  
  .calendar-content {
    margin: 0 auto;
  }
  
  /* Calendar link styling */
  .calendar-card a {
    color: #3E6947;
    text-decoration: underline;
    font-weight: bold;
  }
  
  .calendar-card a:hover {
    color: #2d4f35;
  }
  
  /* CTA Button */
  .calendar-cta {
    text-align: center;
    margin-top: 30px;
  }
  
  .cta-button {
    display: inline-block;
    padding: 15px 40px;
    background: #3E6947;
    color: #fff;
    font-family: 'Raleway', sans-serif;
    font-size: 18px;
    text-decoration: none;
    border-radius: 4px;
    font-weight: 600;
    transition: background 0.3s ease;
  }
  
  .cta-button:hover {
    background: #2d4f35;
    text-decoration: none;
  }
  
  /* Desktop: positioned layout */
  @media (min-width: 550px) {
    .calendar-main-container {
      margin-left: 0;
      margin-right: 0;
      margin-top: 0;
      padding: 0 20px 40px 20px;
    }
    
    .calendar-content {
      margin-left: 0;
      padding-left: 0;
    }
  }
</style>
{{ end }}
