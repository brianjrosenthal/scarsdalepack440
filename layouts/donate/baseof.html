<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>{{ block "title" . }}{{ with .Title }}{{ . }} | {{ end }}{{ .Site.Title }}{{ end }}</title>
<link rel="stylesheet" href="/css/main.css" />
{{- if .IsHome }}<meta name="description" content="Pack 440 - Scarsdale Cub Scouts" />{{ end -}}
</head>
<body>
  {{ partial "header.html" . }}

  <main id="content" class="container" style="max-width: 100%; padding: 0;">
    {{ block "main" . }}{{ .Content }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
