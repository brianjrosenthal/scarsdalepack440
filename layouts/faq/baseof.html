<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>{{ block "title" . }}{{ with .Title }}{{ . }} | {{ end }}{{ .Site.Title }}{{ end }}</title>
<link rel="stylesheet" href="/css/main.css" />
{{- if .IsHome }}<meta name="description" content="Pack 440 - Scarsdale Cub Scouts" />{{ end -}}
</head>
<body>
  {{ partial "header.html" . }}

  <!-- Fixed position title for FAQ page -->
  <div style="position: absolute; left: 340px; top: 200px; z-index: 10;">
    <h1 style="color: #000; font-size: 36px; margin: 0; font-weight: 700;">{{ .Title }}</h1>
  </div>

  <main id="content" class="container">
    {{ block "main" . }}{{ .Content }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
