{{ define "main" }}
<div class="faq-main-container" style="background: #fff; color: #333; min-height: 500px;">
  <div class="faq-content" style="max-width: 980px;">
    <div>
      {{- range .Params.faqs -}}
      <div style="margin-bottom: 30px; padding: 25px; background: #f9f9f9; border-radius: 12px; border: 1px solid #e0e0e0;">
        <h3 style="color: #3E6947; font-size: 22px; margin: 0 0 12px 0; font-weight: 600;">{{ .question }}</h3>
        <div style="color: #333; line-height: 1.8; font-size: 16px;">
          {{ .answer | markdownify }}
        </div>
      </div>
      {{- end -}}
    </div>
  </div>
</div>


<style>
  /* Mobile-first: natural flow with padding */
  .faq-main-container {
    padding: 0 16px 40px 16px;
  }
  
  .faq-content {
    margin: 0 auto;
  }
  
  /* Desktop: positioned layout */
  @media (min-width: 550px) {
    .faq-main-container {
      margin-left: 0;
      margin-right: 0;
      margin-top: 0;
      padding: 0 20px 40px 20px;
    }
    
    .faq-content {
      margin-left: 0;
      padding-left: 0;
    }
  }
</style>
{{ end }}
